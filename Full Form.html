<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form {
            border: 5px solid black;
            border-radius: 20px;
            padding: 70px;
            margin: 70px;
            background-color: rgb(216, 246, 246);
            font-family: 'Times New Roman', Times, serif;
            font-size: x-large;
            text-align: center;
        }
    </style>
</head>
<body>
    <form>
        <label for="name">Username: </label>
        <input type="text" id="name" required> <br><br>

        <label for="pass">Password: </label>
        <input type="password" id="pass" minlength="6" required> <br><br>

        <label for="mail">Email: </label>
        <input type="email" id="mail" required> <br><br>

        <label for="age">Age: </label>
        <input type="number" id="age" required> <br><br>

        <label for="mob">Mobile Number: </label>
        <input type="tel" id="mob" required> <br><br>

        <label for="gen">Gender: </label> <br>

        <label for="male">Male</label>
        <input type="radio" id="male" value="Male" name="gen">
        <label for="female">Female</label>
        <input type="radio" id="female" value="Female" name="gen">
        <label for="other">Other</label>
        <input type="radio" id="other" value="Other" name="gen"> <br><br>

        <label for="c">Course: </label>
        <select id="c">
            <option value=" ">Choose a Course</option>
            <option value="BBA">BBA</option>
            <option value="BBA-CA">BBA-CA</option>
            <option value="BBA-IB">BBA-IB</option>
        </select> <br><br>

        <textarea id="address" placeholder="e.g. address"></textarea> <br><br>

        <button type="button" onclick="check()">Submit</button>
    </form>

    <h2 id="op"></h2>

    <script>
        function check() {
            let mail = document.getElementById("mail").value;

            let num = document.getElementById("mob").value;

            let cc = document.getElementById("c").value;

            if (!mail.includes('@')) {
                document.getElementById("op").innerHTML += 
                "ERROR! Your email doesn't contain an @ symbol!<br>";
            }
            
            if (num.length != 10) {
                document.getElementById("op").innerHTML += 
                "ERROR! Mobile Number should be exactly 10 digits long!<br>";
            }

            if (cc === " ") {
                document.getElementById("op").innerHTML += 
                "ERROR! You must choose a Course!<br>";
            }
        }
    </script>
</body>
</html>
